apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-app
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-app
  template:
    metadata:
      labels:
        app: task-app
    spec:
      containers:
        - name: task-app
          image: task-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
