apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: task-app
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: task-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
